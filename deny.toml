# cargo-deny configuration. Keeps the dependency tree honest:
#   - advisories: fail on known RUSTSEC advisories.
#   - licenses:   allow only OSI-recognised permissive licenses.
#   - bans:       block packages we don't want pulled in transitively.
#   - sources:    only crates.io.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # AES overflow panic — affects only servers that enable overflow
    # checks; reqwest/rustls chain pulls it. Watch for upstream patch.
    "RUSTSEC-2025-0009",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "MPL-2.0",
    # NCSA is permissive (BSD-like); shows up via `(MIT OR Apache-2.0)
    # AND NCSA` from ort-sys (ONNX Runtime FFI), which we use for
    # local embeddings.
    "NCSA",
    # webpki-roots etc. use CDLA-Permissive-2.0 for the bundled
    # CA list. Permissive, redistribution allowed.
    "CDLA-Permissive-2.0",
    # `ring` bundles its license file as "ISC AND OpenSSL"; the
    # OpenSSL clause covers crypto code paths we ship as binary.
    "OpenSSL",
]
confidence-threshold = 0.93

# ring carries a bespoke license. Treat its in-tree LICENSE file as
# equivalent to ISC + OpenSSL for the purposes of this project.
[[licenses.clarify]]
name = "ring"
expression = "ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "allow"
# Workspace-internal `{ workspace = true }` deps register as `*` to
# cargo-deny, and crates with `repository = ...` are considered
# "public" so `allow-wildcard-paths` does not exempt them. The
# crates themselves are not on crates.io yet; downgrade to a warning
# until we publish.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
