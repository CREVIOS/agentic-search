# cargo-deny configuration. Keeps the dependency tree honest:
#   - advisories: fail on known RUSTSEC advisories.
#   - licenses:   allow only OSI-recognised permissive licenses.
#   - bans:       block packages we don't want pulled in transitively.
#   - sources:    only crates.io.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
