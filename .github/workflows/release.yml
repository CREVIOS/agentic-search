name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Resolve the ref every downstream job checks out so a manual
  # `workflow_dispatch` with `tag: v0.1.0` builds the tag, not whatever
  # branch HEAD happens to be when the workflow fires.
  resolve:
    name: Resolve target ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: agentic-search-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: agentic-search-aarch64-linux.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: agentic-search-x86_64-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: agentic-search-aarch64-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: agentic-search-x86_64-windows.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compile toolchain (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p as-cli

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.archive }} agentic-search
          (cd dist && shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256)

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/agentic-search.exe -DestinationPath dist/${{ matrix.archive }}
          (Get-FileHash dist/${{ matrix.archive }} -Algorithm SHA256).Hash | Out-File -FilePath dist/${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  build-python:
    name: Build Python SDKs
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdists + wheels
        run: |
          python -m pip install --upgrade pip build
          mkdir -p dist/python
          for pkg in sdks/python/*/; do
            python -m build --sdist --wheel "$pkg" --outdir dist/python
          done
      - uses: actions/upload-artifact@v4
        with:
          name: python-dists
          path: dist/python/*

  build-node:
    name: Build Node SDK tarball
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Build + pack
        working-directory: sdks/node/agentic-search
        run: |
          pnpm install --frozen-lockfile=false
          pnpm run build
          npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: node-tarball
          path: sdks/node/agentic-search/*.tgz

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, build-cli, build-python, build-node]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name '*.whl' -o -name '*.tgz' \) -exec cp -v {} release/ \;
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body_path: CHANGELOG.md
          files: release/*
          generate_release_notes: false
          draft: false
          prerelease: false
