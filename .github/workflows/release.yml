name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write  # publish container images to GHCR
  id-token: write  # PyPI trusted publishing (OIDC)

jobs:
  # Resolve the ref every downstream job checks out so a manual
  # `workflow_dispatch` with `tag: v0.1.0` builds the tag, not whatever
  # branch HEAD happens to be when the workflow fires.
  resolve:
    name: Resolve target ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: agentic-search-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: agentic-search-aarch64-linux.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: agentic-search-x86_64-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: agentic-search-aarch64-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: agentic-search-x86_64-windows.zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compile toolchain (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p agentic-search-cli

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.archive }} agentic-search
          (cd dist && shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256)

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/agentic-search.exe -DestinationPath dist/${{ matrix.archive }}
          (Get-FileHash dist/${{ matrix.archive }} -Algorithm SHA256).Hash | Out-File -FilePath dist/${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  build-python:
    name: Build Python SDKs
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdists + wheels
        run: |
          python -m pip install --upgrade pip build
          mkdir -p dist/python
          for pkg in sdks/python/*/; do
            python -m build --sdist --wheel "$pkg" --outdir dist/python
          done
      - uses: actions/upload-artifact@v4
        with:
          name: python-dists
          path: dist/python/*

  build-node:
    name: Build Node SDK tarball
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # version input intentionally omitted — package.json packageManager
      # field drives the pnpm version (avoids ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - name: Build + pack
        working-directory: sdks/node/agentic-search
        run: |
          pnpm install --frozen-lockfile=false
          pnpm run build
          npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: node-tarball
          path: sdks/node/agentic-search/*.tgz

  build-docker:
    name: Build + push container image (GHCR)
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase repo owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image tag (strip leading `v`)
        id: imgtag
        run: echo "name=$(echo '${{ needs.resolve.outputs.tag }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/agentic-search:${{ steps.imgtag.outputs.name }}
            ghcr.io/${{ steps.owner.outputs.name }}/agentic-search:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- registry publishing ----------
  # Each registry job is gated on its secret being set so the workflow
  # still completes (and the GitHub Release still publishes) on a fresh
  # repo before secrets are configured. Set the secrets in
  # Settings → Secrets and variables → Actions before tagging the next
  # version and the jobs will start uploading.

  publish-crates:
    name: Publish Rust crates → crates.io
    needs: [resolve, build-cli]
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_CRATES == 'true' || secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Workspace dep order. Each `cargo publish` blocks until the
          # crate is queryable from the index, so dependents resolve
          # cleanly on the next step.
          for crate in \
            agentic-search-core \
            agentic-search-embed \
            agentic-search-store \
            agentic-search-fs \
            agentic-search-cache \
            agentic-search-grep \
            agentic-search-ast \
            agentic-search-vec \
            agentic-search-plan \
            agentic-search-server \
            agentic-search-cli ; do
            echo "::group::publish $crate"
            cargo publish -p "$crate" --locked --no-verify || {
              echo "skip $crate (already published at this version?)"
            }
            # crates.io index has a small propagation delay; tolerate it.
            sleep 20
            echo "::endgroup::"
          done

  publish-pypi:
    name: Publish Python SDKs → PyPI
    needs: [resolve, build-python]
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_PYPI == 'true' || secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dists
          path: dist/python
      # Two paths:
      #   - PYPI_API_TOKEN secret set → classic token upload via twine
      #   - No token but PyPI trusted publishing configured → OIDC path
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    name: Publish Node SDK → npm
    needs: [resolve, build-node]
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_NPM == 'true' || secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
      - name: Build + publish
        working-directory: sdks/node/agentic-search
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm install --frozen-lockfile=false
          pnpm run build
          # publishConfig.access in package.json forces public scope.
          npm publish --access public

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, build-cli, build-python, build-node, build-docker]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name '*.whl' -o -name '*.tgz' \) -exec cp -v {} release/ \;
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          body_path: CHANGELOG.md
          files: release/*
          generate_release_notes: false
          draft: false
          prerelease: false
