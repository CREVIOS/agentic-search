name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets

  node:
    name: Node SDK (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # `version` input intentionally omitted — `package.json` declares
      # `packageManager: pnpm@…` which the action reads. Setting both
      # trips ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - name: install
        run: pnpm install --frozen-lockfile=false
      - name: build
        run: pnpm -r build

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go/agenticsearch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  python:
    name: Python SDK adapters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - sdks/python/claude_agent_search
          - sdks/python/openai_agentic_search
          - sdks/python/deepagents_search
          - sdks/python/langchain_agentic_search
          - sdks/python/crewai_agentic_search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel "${{ matrix.pkg }}"
